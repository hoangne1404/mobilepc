<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>QR Realtime Bridge</title>
    <style>
      :root {
        --bg: #0b0f17;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: #243244;
        --btn: #2563eb;
        --btn2: #374151;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        background: radial-gradient(1200px 900px at 50% 0%, #0f172a, var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .card {
        width: min(920px, 100%);
        background: color-mix(in srgb, var(--panel), #000 8%);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 14px;
        font-weight: 650;
        letter-spacing: 0.2px;
      }

      .muted {
        color: var(--muted);
      }

      .row {
        display: grid;
        gap: 16px;
      }

      @media (min-width: 860px) {
        .row.two {
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.12);
      }

      .qr {
        display: grid;
        place-items: center;
        padding: 10px;
      }

      #qrImg {
        width: min(420px, 80vw);
        height: auto;
        border-radius: 14px;
        background: #fff;
        padding: 10px;
      }

      .urlbox {
        margin-top: 10px;
        word-break: break-all;
        font-size: 13px;
        line-height: 1.35;
      }

      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        font-weight: 650;
        font-size: 14px;
        cursor: pointer;
        color: #fff;
        background: var(--btn);
      }

      button.secondary {
        background: var(--btn2);
      }

      button.danger {
        background: var(--danger);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      video {
        width: 100%;
        background: #000;
        border-radius: 14px;
        border: 1px solid var(--border);
      }

      .hidden {
        display: none !important;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
        margin-bottom: 12px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #64748b;
      }

      .dot.on {
        background: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="pcView" class="hidden">
        <div class="tag"><span id="pcDot" class="dot"></span><span id="pcTagText">PC</span></div>
        <h1>Kết nối điện thoại bằng QR</h1>
        <div class="row two">
          <div id="pcQrPanel" class="panel">
            <div class="qr">
              <img id="qrImg" alt="QR code" />
            </div>
            <div class="urlbox muted" id="joinUrl"></div>
            <div class="buttons">
              <button id="pcDisconnect" class="danger">Disconnect / Tắt</button>
              <button id="pcNewSession" class="secondary">Tạo session mới</button>
            </div>
            <div class="muted" id="pcStatus" style="margin-top: 10px"></div>
          </div>
          <div id="pcVideoPanel" class="panel hidden">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="muted" id="pcVideoStatus" style="margin-top: 10px"></div>
          </div>
        </div>
      </div>

      <div id="mobileView" class="hidden">
        <div class="tag"><span id="mDot" class="dot"></span><span id="mTagText">Mobile</span></div>
        <h1>Chia sẻ camera sang PC</h1>
        <div class="panel">
          <div class="muted" id="mobileStatus"></div>
          <video id="localVideo" class="hidden" autoplay playsinline muted></video>
          <div class="buttons">
            <button id="btnStart">Start Sharing</button>
            <button id="btnStop" class="secondary" disabled>Stop</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      (() => {
        const qs = new URLSearchParams(location.search);
        const sessionFromUrl = qs.get("session");
        const forcedRole = qs.get("role");
        const isMobileUa = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const role = forcedRole || (sessionFromUrl && isMobileUa ? "mobile" : "pc");

        const pcView = document.getElementById("pcView");
        const mobileView = document.getElementById("mobileView");

        if (role === "mobile") initMobile();
        else initPc();

        function setDot(id, on) {
          const el = document.getElementById(id);
          el.classList.toggle("on", Boolean(on));
        }

        function initPc() {
          pcView.classList.remove("hidden");
          setDot("pcDot", false);

          const qrImg = document.getElementById("qrImg");
          const joinUrlEl = document.getElementById("joinUrl");
          const pcStatus = document.getElementById("pcStatus");
          const pcVideoPanel = document.getElementById("pcVideoPanel");
          const pcQrPanel = document.getElementById("pcQrPanel");
          const pcVideoStatus = document.getElementById("pcVideoStatus");
          const remoteVideo = document.getElementById("remoteVideo");
          const btnDisconnect = document.getElementById("pcDisconnect");
          const btnNewSession = document.getElementById("pcNewSession");

          const socket = io();
          let sessionId = null;
          let peer = null;
          let endAction = null;

          btnDisconnect.addEventListener("click", () => {
            if (!sessionId) return;
            endAction = "disconnect";
            socket.emit("pc:end-session", { sessionId });
            teardownPeer();
            setDot("pcDot", false);
            pcVideoPanel.classList.add("hidden");
            pcQrPanel.classList.remove("hidden");
            pcVideoStatus.textContent = "";
            pcStatus.textContent = "Đã ngắt kết nối.";
          });

          btnNewSession.addEventListener("click", async () => {
            if (sessionId) {
              endAction = "new";
              socket.emit("pc:end-session", { sessionId });
            } else {
              await createSession();
            }
          });

          socket.on("connect", async () => {
            pcStatus.textContent = "Đang tạo session...";
            await createSession();
          });

          socket.on("session:mobile-connected", () => {
            setDot("pcDot", true);
            pcStatus.textContent = "Điện thoại đã kết nối. Chờ stream...";
            pcQrPanel.classList.add("hidden");
            pcVideoPanel.classList.remove("hidden");
            pcVideoStatus.textContent = "Đang chờ video từ điện thoại...";
          });

          socket.on("session:mobile-disconnected", () => {
            setDot("pcDot", false);
            pcVideoStatus.textContent = "Điện thoại đã ngắt. Quét lại QR để kết nối.";
            teardownPeer();
            pcQrPanel.classList.remove("hidden");
            pcVideoPanel.classList.add("hidden");
          });

          socket.on("session:ended", async () => {
            teardownPeer();
            setDot("pcDot", false);
            pcVideoPanel.classList.add("hidden");
            pcQrPanel.classList.remove("hidden");
            pcStatus.textContent =
              endAction === "disconnect"
                ? "Đã ngắt kết nối. Tạo session mới..."
                : endAction === "new"
                  ? "Tạo session mới..."
                  : "Session đã kết thúc. Tạo session mới...";
            endAction = null;
            await createSession();
          });

          socket.on("webrtc:offer", async ({ sdp } = {}) => {
            if (!sessionId || !sdp) return;
            try {
              if (!peer) peer = createPeer();
              await peer.setRemoteDescription(sdp);
              const answer = await peer.createAnswer();
              await peer.setLocalDescription(answer);
              socket.emit("webrtc:answer", { sessionId, sdp: peer.localDescription });
              pcVideoStatus.textContent = "Đang kết nối WebRTC...";
            } catch (e) {
              pcVideoStatus.textContent = "Lỗi WebRTC (offer/answer).";
              teardownPeer();
            }
          });

          socket.on("webrtc:ice-candidate", async ({ candidate } = {}) => {
            if (!peer || !candidate) return;
            try {
              await peer.addIceCandidate(candidate);
            } catch {}
          });

          socket.on("mobile:stopped", () => {
            pcVideoStatus.textContent = "Điện thoại đã dừng chia sẻ.";
            teardownPeer();
          });

          async function createSession() {
            const resp = await new Promise((resolve) => socket.emit("pc:create-session", resolve));
            if (!resp || !resp.ok) {
              pcStatus.textContent = "Không tạo được session.";
              return;
            }

            sessionId = resp.sessionId;
            const joinUrl = `${location.origin}/?session=${encodeURIComponent(sessionId)}`;
            joinUrlEl.textContent = joinUrl;
            qrImg.src = `/qr?text=${encodeURIComponent(joinUrl)}`;

            pcStatus.textContent = `Session: ${sessionId}. Dùng điện thoại quét QR để kết nối.`;
            setDot("pcDot", false);
          }

          function createPeer() {
            const pc = new RTCPeerConnection({
              iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });

            pc.onicecandidate = (e) => {
              if (e.candidate) socket.emit("webrtc:ice-candidate", { sessionId, candidate: e.candidate });
            };

            pc.ontrack = (e) => {
              const [stream] = e.streams;
              if (stream) {
                remoteVideo.srcObject = stream;
                pcVideoStatus.textContent = "Đang phát.";
              }
            };

            pc.onconnectionstatechange = () => {
              const st = pc.connectionState;
              if (st === "connected") pcVideoStatus.textContent = "Đang phát.";
              if (st === "failed" || st === "disconnected") pcVideoStatus.textContent = "Mất kết nối WebRTC.";
            };

            return pc;
          }

          function teardownPeer() {
            if (!peer) return;
            try {
              peer.ontrack = null;
              peer.onicecandidate = null;
              peer.close();
            } catch {}
            peer = null;
            if (remoteVideo.srcObject) remoteVideo.srcObject = null;
          }
        }

        function initMobile() {
          mobileView.classList.remove("hidden");
          setDot("mDot", false);

          const sessionId = sessionFromUrl;
          const statusEl = document.getElementById("mobileStatus");
          const btnStart = document.getElementById("btnStart");
          const btnStop = document.getElementById("btnStop");
          const localVideo = document.getElementById("localVideo");

          const socket = io();
          let peer = null;
          let stream = null;
          let joined = false;

          btnStart.addEventListener("click", startSharing);
          btnStop.addEventListener("click", stopSharing);

          socket.on("connect", () => {
            if (!sessionId) {
              statusEl.textContent = "Thiếu session trong URL.";
              btnStart.disabled = true;
              return;
            }

            statusEl.textContent = "Đang join session...";
            socket.emit("mobile:join", { sessionId }, (resp) => {
              if (!resp || !resp.ok) {
                statusEl.textContent = "Không join được session (QR hết hạn hoặc sai).";
                btnStart.disabled = true;
                return;
              }
              joined = true;
              setDot("mDot", true);
              statusEl.textContent = "Đã kết nối. Nhấn Start Sharing.";
            });
          });

          socket.on("session:ended", () => {
            stopSharing({ emitStop: false, keepStatus: true });
            joined = false;
            setDot("mDot", false);
            statusEl.textContent = "Session đã kết thúc. Quét lại QR trên PC.";
            btnStart.disabled = true;
            btnStop.disabled = true;
          });

          socket.on("webrtc:answer", async ({ sdp } = {}) => {
            if (!peer || !sdp) return;
            try {
              await peer.setRemoteDescription(sdp);
              statusEl.textContent = "Đang phát sang PC.";
            } catch {
              statusEl.textContent = "Lỗi WebRTC (answer).";
            }
          });

          socket.on("webrtc:ice-candidate", async ({ candidate } = {}) => {
            if (!peer || !candidate) return;
            try {
              await peer.addIceCandidate(candidate);
            } catch {}
          });

          async function startSharing() {
            if (!joined) return;
            if (peer) return;

            btnStart.disabled = true;
            statusEl.textContent = "Đang xin quyền camera...";

            try {
              stream = await getStream();
              localVideo.srcObject = stream;
              localVideo.classList.remove("hidden");

              peer = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
              });

              peer.onicecandidate = (e) => {
                if (e.candidate) socket.emit("webrtc:ice-candidate", { sessionId, candidate: e.candidate });
              };

              peer.onconnectionstatechange = () => {
                const st = peer.connectionState;
                if (st === "connected") statusEl.textContent = "Đang phát sang PC.";
                if (st === "failed") statusEl.textContent = "WebRTC failed (thử lại).";
              };

              for (const track of stream.getTracks()) {
                peer.addTrack(track, stream);
              }

              const offer = await peer.createOffer();
              await peer.setLocalDescription(offer);
              socket.emit("webrtc:offer", { sessionId, sdp: peer.localDescription });

              btnStop.disabled = false;
              statusEl.textContent = "Đang kết nối tới PC...";
            } catch (e) {
              stopSharing({ emitStop: false, keepStatus: true });
              btnStart.disabled = false;
              btnStop.disabled = true;
              statusEl.textContent = "Không lấy được camera / màn hình.";
            }
          }

          function stopSharing({ emitStop = true, keepStatus = false } = {}) {
            btnStop.disabled = true;
            btnStart.disabled = false;

            if (peer) {
              try {
                peer.onicecandidate = null;
                peer.onconnectionstatechange = null;
                peer.close();
              } catch {}
              peer = null;
            }

            if (stream) {
              for (const t of stream.getTracks()) t.stop();
              stream = null;
            }

            if (localVideo.srcObject) localVideo.srcObject = null;
            localVideo.classList.add("hidden");

            if (joined && emitStop) socket.emit("mobile:stop", { sessionId });
            if (joined && !keepStatus) statusEl.textContent = "Đã dừng. Nhấn Start Sharing để phát lại.";
          }

          async function getStream() {
            const wantScreen = qs.get("source") === "screen";
            if (wantScreen && navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
              return navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            }

            const constraints = {
              video: { facingMode: { ideal: "environment" } },
              audio: false
            };
            return navigator.mediaDevices.getUserMedia(constraints);
          }
        }
      })();
    </script>
  </body>
</html>
